<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kota Remote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked, Highlight, DOMPurify -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-highlight/lib/index.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600&display=swap');
        
        body {
            background: linear-gradient(135deg, #1f2022 0%, #151618 100%);
            color: #d1d5db;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hardware-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #232528;
            border: 2px solid #333;
            border-radius: 12px;
            margin: 10px;
            box-shadow: 
                inset 0 1px 1px rgba(255,255,255,0.1),
                0 10px 20px rgba(0,0,0,0.5);
            padding: 16px;
        }

        .lcd-display {
            background: #111a13;
            border: 4px solid #000;
            border-radius: 8px;
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Share Tech Mono', monospace;
            color: #64ffda;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            text-shadow: 0 0 5px rgba(100,255,218,0.5);
            font-size: 14px;
            line-height: 1.4;
        }

        .lcd-display::-webkit-scrollbar {
            width: 8px;
        }
        .lcd-display::-webkit-scrollbar-track {
            background: #0a0f0b;
        }
        .lcd-display::-webkit-scrollbar-thumb {
            background: #2b4d3f;
            border-radius: 4px;
        }

        .control-area {
            margin-top: 16px;
            display: flex;
            gap: 12px;
        }

        .hardware-input {
            flex: 1;
            background: #111;
            border: 2px solid #000;
            border-radius: 4px;
            color: #fff;
            padding: 12px;
            font-family: 'Share Tech Mono', monospace;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .hardware-input:focus {
            outline: none;
            border-color: #444;
        }

        .tactile-btn {
            background: linear-gradient(to bottom, #444, #222);
            border: 1px solid #111;
            border-radius: 6px;
            color: #ccc;
            font-weight: bold;
            padding: 0 24px;
            text-transform: uppercase;
            box-shadow: 
                0 4px 0 #111,
                0 5px 10px rgba(0,0,0,0.4),
                inset 0 1px 1px rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.1s;
        }
        .tactile-btn:active {
            transform: translateY(4px);
            box-shadow: 
                0 0 0 #111,
                0 1px 2px rgba(0,0,0,0.4),
                inset 0 1px 1px rgba(255,255,255,0.2);
        }

        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #333;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 2px rgba(0,0,0,0.5);
            margin-bottom: 8px;
        }
        .led.active {
            background: #ff3e00;
            box-shadow: inset 0 0 4px #ff3e00, 0 0 10px #ff3e00;
        }
        .led.connected {
            background: #64ffda;
            box-shadow: inset 0 0 4px #64ffda, 0 0 10px #64ffda;
        }
        .led.coder {
            background: #64ffda;
            box-shadow: inset 0 0 4px #64ffda, 0 0 10px #64ffda;
        }
        .led.cpe {
            background: #fbbf24;
            box-shadow: inset 0 0 4px #fbbf24, 0 0 10px #fbbf24;
        }
        .led.eval {
            background: #ec4899;
            box-shadow: inset 0 0 4px #ec4899, 0 0 10px #ec4899;
        }
        .led.research {
            background: #3b82f6;
            box-shadow: inset 0 0 4px #3b82f6, 0 0 10px #3b82f6;
        }
        .led.architect {
            background: #a855f7;
            box-shadow: inset 0 0 4px #a855f7, 0 0 10px #a855f7;
        }
        
        .mode-btn {
            background: #222;
            border: 1px solid #333;
            color: #777;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .mode-btn.active {
            border-color: #64ffda;
            color: #64ffda;
            background: #0f1c18;
            box-shadow: 0 0 5px rgba(100,255,218,0.2);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .brand {
            font-weight: 800;
            letter-spacing: 2px;
            color: #555;
            text-shadow: 0 1px 0 rgba(255,255,255,0.1);
        }

        .message { margin-bottom: 8px; }
        .message.user { color: #facc15; }
        .message.assistant { color: #64ffda; }
        .message.system { color: #888; }
        .message.tool { color: #ff3e00; }
        .message.thinking { color: #6b7280; font-style: italic; }

        /* Markdown Styling */
        .message.assistant p { margin-bottom: 0.5em; }
        .message.assistant pre { background: #000; padding: 8px; border-radius: 4px; overflow-x: auto; margin: 8px 0; border: 1px solid #333; }
        .message.assistant code { font-family: 'Share Tech Mono', monospace; background: #0a0f0b; padding: 2px 4px; border-radius: 2px; border: 1px solid #222; }
        .message.assistant pre code { padding: 0; background: transparent; border: none; }
        .message.assistant ul { list-style-type: disc; margin-left: 20px; margin-bottom: 0.5em; }
        .message.assistant ol { list-style-type: decimal; margin-left: 20px; margin-bottom: 0.5em; }
        .message.assistant h1, .message.assistant h2, .message.assistant h3 { color: #fff; margin-top: 1em; margin-bottom: 0.5em; font-weight: bold; }
        .message.assistant a { color: #3b82f6; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="hardware-panel">
        <div class="panel-header">
            <div class="brand">KOTA REMOTE ///</div>
            <div class="flex gap-4">
                <div class="flex flex-col items-center">
                    <div id="led-conn" class="led"></div>
                    <span class="text-[10px] text-gray-500 font-bold uppercase">Link</span>
                </div>
                <div class="flex flex-col items-center">
                    <div id="led-busy" class="led"></div>
                    <span class="text-[10px] text-gray-500 font-bold uppercase">Busy</span>
                </div>
                <div class="flex flex-col items-center">
                    <div id="led-mode" class="led coder"></div>
                    <span id="label-mode" class="text-[10px] text-gray-500 font-bold uppercase">Coder</span>
                </div>
                <div class="flex flex-col items-center border-l border-[#333] pl-4 ml-2">
                    <div id="power-gauge" class="text-sm text-[#64ffda] font-mono font-bold" style="font-family: 'Share Tech Mono', monospace;">⚡ 0.0W</div>
                    <span id="power-joules" class="text-[10px] text-gray-500 font-bold uppercase">0.0 J</span>
                </div>
            </div>
        </div>

        <!-- Mode selector row -->
        <div class="flex gap-2 mb-4 justify-between bg-[#111] p-2 border border-black rounded">
            <button type="button" onclick="changeMode('coder')" class="mode-btn active" id="btn-coder">CODER</button>
            <button type="button" onclick="changeMode('cpe')" class="mode-btn" id="btn-cpe">CPE</button>
            <button type="button" onclick="changeMode('eval')" class="mode-btn" id="btn-eval">EVAL</button>
            <button type="button" onclick="changeMode('research')" class="mode-btn" id="btn-research">RESEARCH</button>
            <button type="button" onclick="changeMode('architect')" class="mode-btn" id="btn-architect">ARCH</button>
        </div>
        
        <div class="lcd-display" id="output">
            <div class="message system">KOTA SYSTEM INITIALIZED...</div>
            <div class="message system">WAITING FOR CONNECTION...</div>
        </div>

        <form id="input-form" class="control-area">
            <input type="text" id="cmd-input" class="hardware-input" placeholder="ENTER COMMAND..." autocomplete="off">
            <button type="submit" class="tactile-btn">SEND</button>
        </form>
    </div>

    <script>
        const output = document.getElementById('output');
        const form = document.getElementById('input-form');
        const input = document.getElementById('cmd-input');
        const ledConn = document.getElementById('led-conn');
        const ledBusy = document.getElementById('led-busy');
        const ledMode = document.getElementById('led-mode');
        const labelMode = document.getElementById('label-mode');
        const powerGauge = document.getElementById('power-gauge');
        const powerJoules = document.getElementById('power-joules');
        
        let ws;
        let isBusy = false;
        let thinkingLine = null;
        let currentAssistantLine = null;

        const { Marked } = window.marked;
        const { markedHighlight } = window.markedHighlight;
        const markedInstance = new Marked(
            markedHighlight({
                langPrefix: 'hljs language-',
                highlight(code, lang) {
                    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                }
            })
        );

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onopen = () => {
                ledConn.classList.add('connected');
                appendLine('system', 'CONNECTION ESTABLISHED.');
            };
            
            ws.onclose = () => {
                ledConn.classList.remove('connected');
                appendLine('system', 'CONNECTION LOST. RECONNECTING...');
                setTimeout(connect, 2000);
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                handleEvent(data.event || data);
            };
        }

        function appendLine(type, text) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerText = text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
            return div;
        }

        function setBusy(state) {
            isBusy = state;
            if (state) {
                ledBusy.classList.add('active');
            } else {
                ledBusy.classList.remove('active');
            }
        }

        function handleEvent(ev) {
            switch (ev.type) {
                case 'UserMessage':
                    if (ev.source === 'system') {
                        const content = ev.text.replace("SYSTEM:", "").trim();
                        for (const line of content.split('\n')) {
                            appendLine('system', `  ${line}`);
                        }
                        if (ev.text.startsWith("SYSTEM: Mode changed to ")) {
                            const m = ev.text.replace("SYSTEM: Mode changed to ", "").trim().toLowerCase();
                            updateModeUI(m);
                        }
                    } else if (ev.source === 'terminal') {
                        appendLine('user', `💻 [Terminal]: ${ev.text}`);
                    } else {
                        appendLine('user', `> ${ev.text}`);
                    }
                    break;
                case 'StepStarted':
                    appendLine('system', `--- STEP ${ev.step} (${ev.tokens_in} TOKENS) ---`);
                    thinkingLine = null;
                    currentAssistantLine = null;
                    setBusy(true);
                    break;
                case 'Thinking':
                    if (!thinkingLine) {
                        thinkingLine = appendLine('thinking', '> ' + ev.text);
                    } else {
                        thinkingLine.innerText += ev.text;
                    }
                    output.scrollTop = output.scrollHeight;
                    break;
                case 'Token':
                    if (!currentAssistantLine) {
                        currentAssistantLine = appendLine('assistant', '');
                        currentAssistantLine.rawText = ev.text;
                    } else {
                        currentAssistantLine.rawText += ev.text;
                    }
                    currentAssistantLine.innerHTML = DOMPurify.sanitize(markedInstance.parse(currentAssistantLine.rawText));
                    output.scrollTop = output.scrollHeight;
                    break;
                case 'ToolCallStarted':
                    appendLine('tool', `> EXEC: ${ev.tool}(...)`);
                    break;
                case 'ToolCallFinished':
                    const icon = ev.success ? 'OK' : 'ERR';
                    appendLine('tool', `> ${icon} ${ev.tool} (${ev.duration_ms}ms)`);
                    break;
                case 'CommandFinished':
                    setBusy(false);
                    break;
                case 'Done':
                    appendLine('system', `--- DONE (${ev.duration_ms}ms) ---`);
                    setBusy(false);
                    thinkingLine = null;
                    currentAssistantLine = null;
                    break;
                case 'PowerUpdate':
                    powerGauge.innerText = `⚡ ${ev.watts.toFixed(1)}W`;
                    powerJoules.innerText = `${ev.joules.toFixed(1)} J`;
                    break;
                case 'Error':
                    appendLine('tool', `> ERROR: ${ev.message}`);
                    setBusy(false);
                    break;
            }
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            const val = input.value.trim();
            if (val && ws.readyState === WebSocket.OPEN) {
                ws.send(val);
                input.value = '';
            }
        };

        function changeMode(mode) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(`/mode ${mode}`);
            }
        }

        function updateModeUI(mode) {
            ['coder', 'cpe', 'eval', 'research', 'architect'].forEach(m => {
                const btn = document.getElementById(`btn-${m}`);
                if (btn) btn.classList.remove('active');
            });
            const activeBtn = document.getElementById(`btn-${mode}`);
            if (activeBtn) activeBtn.classList.add('active');

            ledMode.className = 'led ' + mode;
            labelMode.innerText = mode;
        }

        connect();
    </script>
</body>
</html>
