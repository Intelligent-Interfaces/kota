name: Kota CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust-check:
    name: Rust Checks, Docs & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Check documentation
        run: cargo doc --no-deps --document-private-items

      - name: Run cargo tests
        run: cargo test --all-features

  rust-audit:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Security Audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Ignore vulnerable webpki advisories from transitive dependencies (we only use local SQLite features)
          ignore: RUSTSEC-2026-0104, RUSTSEC-2026-0049, RUSTSEC-2026-0099, RUSTSEC-2026-0098

  python-check:
    name: Python Linting, Formatting & Typing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linting & Typing Tools
        run: pip install ruff mypy pandas pandas-stubs matplotlib

      - name: Lint Python Code
        run: ruff check .

      - name: Check Python Formatting
        run: ruff format --check .

      - name: Check Python Types
        run: mypy . --ignore-missing-imports

  go-check:
    name: Go Checks & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Go tests
        run: |
          cd go
          go test -v ./...
