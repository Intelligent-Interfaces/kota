name: Agent Docs Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate AGENTS.md
        run: |
          python scripts/generate_agent_docs.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update agent-native documentation"
          title: "Update Agent-Native Documentation"
          body: "Automated PR to update the AGENTS.md repository context map."
          branch: "chore/update-agent-docs"
          base: main
